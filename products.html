<!DOCTYPE html>
<html>
<head>

<title>Pooja Items</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
<div class="container">

<a class="navbar-brand">🕉 Pooja Store</a>

<ul class="navbar-nav ms-auto">

<li class="nav-item cart">
🛒 Cart (<span id="cart-count">0</span>)
</li>

</ul>

</div>
</nav>

<div class="container mt-5">

<h2 class="text-center text-white">Pooja Items</h2>

<div class="row mt-4">

<!-- Product 1 -->

<div class="col-md-3">

<div class="product">

<img src="agarbatthi.png">

<h4>Agarbatti</h4>

<p>₹50</p>

<button onclick="addToCart('Agarbatti')" class="btn btn-success">Add to Cart</button>

</div>

</div>

<!-- Product 2 -->

<div class="col-md-3">

<div class="product">

<img src="brassdiya.png">

<h4>Brass Diya</h4>

<p>₹150</p>

<button onclick="addToCart('Brass Diya')" class="btn btn-success">Add to Cart</button>

</div>

</div>

<!-- Product 3 -->

<div class="col-md-3">

<div class="product">

<img src="kumkum.png">

<h4>Kumkum</h4>

<p>₹40</p>

<button onclick="addToCart('Kumkum')" class="btn btn-success">Add to Cart</button>

</div>

</div>

<!-- Product 4 -->

<div class="col-md-3">

<div class="product">

<img src="poojathali.png">

<h4>Pooja Thali</h4>

<p>₹300</p>

<button onclick="addToCart('Pooja Thali')" class="btn btn-success">Add to Cart</button>

</div>

</div>

</div>

</div>

<!-- Cart Section -->

<div class="container mt-5">

<h3 class="text-white">Your Cart</h3>

<ul id="cart-items" class="list-group mb-3"></ul>

<button onclick="placeOrder()" class="btn btn-warning">Place Order</button>

</div>

<script src="script.js"></script>

</body>
</html>
